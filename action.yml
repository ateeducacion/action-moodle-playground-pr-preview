name: Moodle Playground PR Preview
description: Automatically add a "Preview in Moodle Playground" button to your pull requests for easy testing of Moodle plugins.

inputs:
  mode:
    type: string
    description: 'How to publish the preview button: `append-to-description` or `comment`'
    default: append-to-description
  playground-host:
    type: string
    description: Base Moodle Playground host URL
    default: https://ateeducacion.github.io/moodle-playground
  blueprint:
    type: string
    description: Custom Moodle Playground Blueprint as a JSON string. When provided, `plugin-path` is ignored.
  blueprint-file:
    type: string
    description: 'Path to a local blueprint JSON file (requires actions/checkout). The action auto-replaces installMoodlePlugin URLs matching the current repo with the PR branch archive URL.'
  blueprint-url:
    type: string
    description: 'URL pointing to a remote blueprint. When provided, the Playground link uses `?blueprint-url={url}` directly.'
  plugin-path:
    type: string
    description: Path to plugin directory inside the repository (e.g., `.` for root). Used to generate an installMoodlePlugin blueprint step.
  moodle-version:
    type: string
    description: 'Moodle version for the blueprint (e.g., "5.0", "4.4")'
    default: '5.0'
  description-template:
    type: string
    description: Custom markdown/HTML template for PR descriptions (supports {{VARIABLE_NAME}} interpolation)
  comment-template:
    type: string
    description: Custom markdown/HTML template for PR comments (supports {{VARIABLE_NAME}} interpolation)
  extra-text:
    type: string
    description: 'Optional text/HTML to display after the preview button (e.g., testing instructions). Also available as {{EXTRA_TEXT}} in custom templates.'
  restore-button-if-removed:
    type: boolean
    description: Whether to restore the preview button if removed by PR author (only applies to `append-to-description` mode)
    default: true
  github-token:
    description: >
      GitHub token for updating PRs (defaults to GITHUB_TOKEN). Required permissions:
      `pull-requests: write`, `contents: read`
  pr-number:
    type: string
    description: Pull request number (optional, defaults to context.payload.pull_request.number). When provided, all PR details will be fetched from the GitHub API.

secrets:
  github-token:
    description: >
      GitHub token for updating PRs (defaults to GITHUB_TOKEN). Required permissions:
      `pull-requests: write`, `contents: read`
    required: false

runs:
  using: 'node20'
  main: 'dist/index.js'

outputs:
  preview-url:
    description: Direct link to the generated Moodle Playground instance.
  blueprint-json:
    description: JSON blueprint (stringified) used for the preview.
  rendered-description:
    description: Markdown/HTML snippet inserted into the PR description.
  rendered-comment:
    description: Markdown/HTML snippet used when posting a comment.
  mode:
    description: Effective preview publishing mode (append-to-description or comment).
  comment-id:
    description: ID of the managed preview comment (if applicable).
